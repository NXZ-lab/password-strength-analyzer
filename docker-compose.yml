version: '3.9'
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env.example
    ports:
      - '5000:5000'
    restart: unless-stopped
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_BASE_URL: http://localhost:5000/api
    ports:
      - '4173:4173'
    depends_on:
      - backend
    restart: unless-stopped
